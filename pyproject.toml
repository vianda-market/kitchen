# ─── mypy ───────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
strict_equality = true
ignore_missing_imports = true

# Existing errors are tracked in mypy-baseline.txt (mypy-baseline package).
# New code must pass all checks above. To fix a baseline error, remove its
# line from mypy-baseline.txt and fix the code — the CI will enforce it.

# Tests: require typed defs but relax some checks
[[tool.mypy.overrides]]
module = "app.tests.*"
disallow_untyped_defs = false
disallow_incomplete_defs = false

# ─── mypy-baseline ──────────────────────────────────────────────
# Drop "note:" diagnostics from the baseline. Notes are informational
# only — they explain an error, never represent one. Including them
# makes the baseline drift across mypy patch versions (the same overload
# gets rendered with different type-arg text), forcing baseline churn
# on every PR. The underlying errors stay baselined; only the explanatory
# notes are filtered out.
[tool.mypy_baseline]
ignore_categories = ["note"]

# ─── radon ──────────────────────────────────────────────────────
[tool.radon]
# Complexity grades: A (1-5), B (6-10), C (11-15), D (16-20), E (21-25), F (26+)
# CI gate: fail if any function exceeds grade D (complexity > 25)
cc_min = "D"
exclude = "app/tests/*,venv/*,.venv/*"

# ─── wily ───────────────────────────────────────────────────────
[tool.wily]
# Track complexity trends over git history
path = "app"
max_revisions = 50
operators = "raw,cyclomatic,maintainability,halstead"

# ─── mutmut ─────────────────────────────────────────────────────
[tool.mutmut]
# Scoped to Tier 1 critical business logic only (money/credits).
# Full-codebase mutation testing is impractical — these are the files
# where a surviving mutant means financial loss.
#
# institution_billing.py is intentionally excluded: per CLAUDE.md, service
# code is tested via Postman collections, not pytest — mutmut has no way
# to invoke Postman, so 100% of its mutants land as "no tests". Keeping
# it in scope just pollutes the denominator. Re-add once pytest coverage
# for billing exists. See docs/testing/MUTATION_TRIAGE.md.
paths_to_mutate = [
    "app/services/credit_validation_service.py",
    "app/services/credit_loading_service.py",
    "app/services/discretionary_service.py",
]
tests_dir = ["app/tests/services/"]
also_copy = [
    "app/",
    "application.py",
    ".env",
    "seeds/",
]
pytest_add_cli_args = [
    "--no-header",
    "-q",
    "--tb=short",
]
