[tool.ruff]
target-version = "py312"
line-length = 120
src = ["app"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "SIM",    # flake8-simplify
    "T20",    # flake8-print (catches stray print() calls)
    "RET",    # flake8-return
    "PIE",    # flake8-pie
    "C4",     # flake8-comprehensions
    "PT",     # flake8-pytest-style
    "PLR0912", # too-many-branches (default: 12)
    "PLR0913", # too-many-arguments (default: 5)
    "PLR0915", # too-many-statements (default: 50 — matches CLAUDE.md <50 lines rule)
]
ignore = [
    "E501",   # line too long — handled by formatter
    "E402",   # module-level import not at top — needed for sys.path setup patterns
    "B008",   # function calls in argument defaults — FastAPI Depends() pattern
"RET504", # unnecessary assignment before return — sometimes aids readability
    "UP042",  # replace-str-enum — TODO: migrate to StrEnum incrementally
    "UP045",  # non-pep604-annotation-optional — TODO: migrate Optional[X] to X | None
    "UP046",  # non-pep695-generic-class — Python 3.12+ syntax, migrate later
    "UP047",  # non-pep695-generic-function — Python 3.12+ syntax, migrate later
    "SIM102", # collapsible-if — sometimes nested ifs are clearer
    "SIM105", # suppressible-exception — contextlib.suppress not always clearer
    "SIM108", # ternary instead of if-else — readability preference
    "SIM117", # multiple-with — readability preference
    "PT009",  # pytest-unittest-assertion — existing tests use unittest style
    "PT011",  # pytest-raises-too-broad — fix incrementally
    "PT018",  # pytest-composite-assertion — fix incrementally
    "PT019",  # pytest-fixture-param-without-value — fix incrementally
    "SIM103", # needless-bool — 2 remaining are intentionally verbose for readability
    "C408",   # unnecessary dict() call — stylistic, dict(k=v) is fine
    "PT012",  # pytest-raises multiple statements — fix incrementally
    "PT027",  # pytest-unittest-raises-assertion — fix incrementally
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
"app/tests/**/*.py" = ["T20"]                   # allow print in tests
"app/db/**/*.py" = ["T20", "F403", "F405"]      # allow print and star imports in DB scripts
"app/config/**/*.py" = ["F405", "F403"]         # config uses star imports
"app/schemas/versioned_schemas.py" = ["F403", "F405"]  # re-exports via star import
"scripts/**/*.py" = ["T20", "INP001"]           # allow print, no package needed
"app/scripts/**/*.py" = ["T20", "INP001"]       # allow print in app scripts
"docs/**/*.py" = ["INP001"]                     # docs scripts don't need __init__

