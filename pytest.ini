[tool:pytest]
# Pytest configuration for the kitchen application

# Test discovery
testpaths = app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, with dependencies)
    slow: Slow running tests
    database: Tests that require database
    api: Tests that make HTTP requests
    smoke: Smoke tests — entry point boots, critical surfaces present (target runtime: seconds)
    policy: Policy-as-code invariants (auth on all routes, no leaked enums, etc.) — fail loudly on drift
    parity: Cross-locale or cross-source shape parity checks (e.g. EN/ES key-set parity)

# Minimum version
minversion = 7.0

# Test output
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:The 'app' shortcut is now deprecated:DeprecationWarning

# Test timeout (in seconds)
timeout = 300

# Parallel execution (if pytest-xdist is installed)
# addopts = --numprocesses=auto
