[pytest]
# Pytest configuration for the kitchen application.
#
# Note: section header is [pytest], NOT [tool:pytest]. The latter is for
# setup.cfg; pytest.ini requires [pytest]. Previously this file had
# [tool:pytest], which pytest silently ignored — every option below was
# dormant. When the header was corrected, addopts were trimmed to what we
# actually want enforced (see below).

testpaths = app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Registered markers. Using an unregistered marker fails under --strict-markers.
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, with dependencies)
    slow: Slow running tests
    database: Tests that require database
    api: Tests that make HTTP requests
    smoke: Smoke tests — entry point boots, critical surfaces present (target runtime: seconds)
    policy: Policy-as-code invariants (auth on all routes, no leaked enums, etc.) — fail loudly on drift
    parity: Cross-locale or cross-source shape parity checks (e.g. EN/ES key-set parity)

minversion = 7.0

# addopts: intentionally minimal. Previous value included --cov=app and
# --cov-fail-under=80, which are unrealistic today (per-layer weighted
# coverage is ~30–55%). Coverage is enforced in CI via:
#   - diff-cover on changed lines (>= 80%) — unit test job, ci.yml
#   - scripts/check_coverage_floor.py per-layer absolute floors — unit test job
# Local runs can still pass --cov=app explicitly when needed.
addopts =
    --strict-markers
    --strict-config
    --tb=short

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:The 'app' shortcut is now deprecated:DeprecationWarning
