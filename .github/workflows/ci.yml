name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install ruff
        run: pip install ruff>=0.8.0

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run mypy (baseline-filtered)
        run: mypy app/ 2>&1 | python -m mypy_baseline filter --no-colors

  layers:
    name: Layer Boundaries
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Check import boundaries
        # Local equivalent:  lint-imports
        # Contracts defined in .importlinter
        run: lint-imports

  complexity:
    name: Complexity Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install radon
        run: pip install radon>=5.1.0

      - name: Check complexity (repo-wide, CC ≤ 25)
        run: bash scripts/check_complexity.sh

      - name: Check maintainability index (>5% drop = fail)
        # Local equivalent:  bash scripts/check_maintainability.sh
        # Uses radon mi to compare changed files vs origin/main.
        run: bash scripts/check_maintainability.sh

      - name: Check complexity (strict, CC ≤ 15 on changed files)
        # Tighter gate: functions in files you touched must be CC ≤ 15.
        # Pre-existing complexity is allowed if baselined.
        # Local equivalent:  bash scripts/check_complexity_strict.sh
        run: bash scripts/check_complexity_strict.sh

  deadcode:
    name: Dead Code Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install vulture
        run: pip install vulture>=2.14

      - name: Check dead code
        # Local equivalent:  bash scripts/check_vulture.sh
        # Baseline update:   bash scripts/check_vulture.sh --update
        run: bash scripts/check_vulture.sh

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install pip-audit + pip-licenses
        run: pip install pip-audit>=2.7.0 pip-licenses>=5.0

      - name: Audit production dependencies
        run: pip-audit -r requirements.txt

      - name: Install production dependencies (for license inspection)
        # pip-licenses reads installed package metadata, so requirements.txt
        # must be installed in the current env before the gate runs.
        run: pip install -r requirements.txt

      - name: Check license compliance
        # Local equivalent:
        #   pip install -r requirements.txt pip-licenses
        #   python scripts/check_licenses.py
        # Allowlist (MIT/Apache/BSD/ISC/MPL/PSF) + per-package exemptions
        # for google-crc32c, google-ads, facebook_business (ambiguous
        # metadata) and psycopg2-binary, pycountry (LGPL, dynamic-linked).
        run: python scripts/check_licenses.py

  bandit:
    name: Security Lint (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install bandit
        run: pip install bandit>=1.9.0

      - name: Run bandit (high severity, baselined)
        # Local equivalent:
        #   bandit -r app/ -lll --exclude app/tests -b .bandit-baseline.json
        # Baseline update:
        #   bandit -r app/ -lll --exclude app/tests -f json -o .bandit-baseline.json
        run: bandit -r app/ -lll --exclude app/tests -b .bandit-baseline.json

  sqllint:
    name: SQL Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install sqlfluff
        run: pip install sqlfluff>=3.0.0

      - name: Lint new SQL files
        # Local equivalent:  bash scripts/check_sqlfluff.sh
        # Existing files baselined in .sqlfluff-baseline.txt.
        run: bash scripts/check_sqlfluff.sh

  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history on push to main; the action limits to PR diff on pull_request.
          fetch-depth: 0

      - name: Install gitleaks
        # gitleaks-action@v2 requires a paid license for org repos.
        # The CLI binary is free — download from GitHub releases.
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks

      - name: Gitleaks
        # Local equivalent:  gitleaks detect --source . --verbose
        # Allowlisted fingerprints in .gitleaksignore (false positives from docs).
        run: gitleaks detect --source . --verbose --redact

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    # app.config.Settings loads at import time and requires these three fields
    # (all other Settings fields have defaults). Without them, pytest fails at
    # collection with pydantic ValidationError before any test runs.
    env:
      SECRET_KEY: ci-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so diff-cover can diff against origin/main.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Verify test collection
        # Catches import errors, missing deps, and broken fixtures before
        # running the full suite. Fails fast with a clear error message.
        # Local equivalent:
        #   pytest --collect-only -q --ignore=app/tests/database
        run: >
          pytest
          --collect-only -q
          --ignore=app/tests/database

      - name: Run unit tests
        # Route and database tests use TestClient/psycopg2 against a live Postgres.
        # Per CLAUDE.md, routes+services are tested via Postman (acceptance job).
        # Local equivalent:
        #   pytest -m "not integration and not database and not slow" \
        #     --ignore=app/tests/database --ignore=app/tests/routes \
        #     --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=0
        run: >
          pytest
          -m "not integration and not database and not slow"
          --ignore=app/tests/database
          --ignore=app/tests/routes
          --tb=short
          --cov=app
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=0
          -q

      - name: Diff coverage gate (changed lines only, >=80%)
        # Local equivalent:
        #   diff-cover coverage.xml --compare-branch=origin/main --fail-under=80
        # On main, HEAD == origin/main so the diff is empty and the gate passes trivially.
        run: diff-cover coverage.xml --compare-branch=origin/main --fail-under=80

  acceptance:
    name: Acceptance Tests (Newman)
    runs-on: ubuntu-latest
    services:
      postgres:
        # schema.sql uses uuidv7() (built-in on Postgres 18+). Prod target is also 18.
        image: postgres:18
        env:
          POSTGRES_USER: kitchen
          POSTGRES_PASSWORD: kitchen
          POSTGRES_DB: kitchen
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: kitchen
      DB_USER: kitchen
      DB_PASSWORD: kitchen
      # libpq reads PGPASSWORD; build_kitchen_db.sh calls psql without -W.
      # Without this, psql prompts interactively → auth failure in CI.
      PGPASSWORD: kitchen
      SECRET_KEY: ci-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DEV_MODE: "true"
      PAYMENT_PROVIDER: mock
      SUPPLIER_PAYOUT_PROVIDER: mock
      EMAIL_PROVIDER: smtp
      QR_HMAC_SECRET: ci-test-hmac-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install newman
        run: npm install -g newman

      - name: Build database (schema + seed)
        run: bash app/db/build_kitchen_db.sh

      - name: Start server
        run: |
          uvicorn application:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/server.pid
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/docs > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8000/docs > /dev/null || { echo "Server failed to start"; exit 1; }

      - name: Run Postman collections
        # Only collections that pass on current main. Others are a known backlog:
        run: bash scripts/run_newman.sh 000 001 002 003 004 005 006 007 008 009 010 011 012 013 014 015 016

      - name: Stop server
        if: always()
        run: |
          [ -f /tmp/server.pid ] && kill "$(cat /tmp/server.pid)" 2>/dev/null || true
