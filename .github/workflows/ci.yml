name: CI

on:
  pull_request:
    branches: [main]
    # NOTE: do NOT add `paths-ignore:` here. The `CI` aggregator (`ci-pass` job
    # below) is a required branch-protection check; if the whole workflow is
    # skipped via paths-ignore, the check stays "pending" forever and the PR
    # is unmergeable. The in-workflow `dorny/paths-filter` (`changes` job) is
    # already responsible for short-circuiting heavy jobs (`test`/`acceptance`)
    # on docs-only PRs while keeping the aggregator runnable. (Caught on PR #143.)
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# dorny/paths-filter needs pull-requests:read. The coverage PR-comment step
# in the `test` job needs pull-requests:write; set at job level (below).
permissions:
  contents: read
  pull-requests: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # changes: compute path filters once. Heavy jobs key off `app-relevant` to
  # skip on docs-only PRs. Never set to false on push to main — main must
  # always carry the full signal even on a docs commit, so we hard-true it.
  # ──────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      app-relevant: ${{ steps.filter.outputs.app-relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # On push to main, force every filter true (paths-filter returns
          # `true` for all keys when base is unset and ref-name matches `main`,
          # but we set `predicate-quantifier: every` and an explicit pattern to
          # be safe). For PRs, paths-filter diffs PR head vs base.
          predicate-quantifier: "some"
          filters: |
            app-relevant:
              - 'app/**'
              - 'application.py'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - 'pytest.ini'
              - '.importlinter'
              - '.bandit-baseline.json'
              - '.sqlfluff*'
              - '.vulture-baseline.txt'
              - 'scripts/**'
              - '.github/workflows/ci.yml'

  # ──────────────────────────────────────────────────────────────────────────
  # Item #1 — lint-job: ruff check + ruff format --check.
  # Shares pip cache keyed on requirements-test.txt.
  # ──────────────────────────────────────────────────────────────────────────
  lint-job:
    name: Lint (ruff)
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.app-relevant == 'true' }}
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test + lint dependencies
        run: pip install -r requirements-test.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # ──────────────────────────────────────────────────────────────────────────
  # Item #1 + #2 — types-job: mypy with bidirectional baseline filter.
  # Adds .mypy_cache caching keyed on sha for exact restore + requirements
  # prefix for restore-key fallback.
  # ──────────────────────────────────────────────────────────────────────────
  types-job:
    name: Types (mypy)
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.app-relevant == 'true' }}
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test + lint dependencies
        run: pip install -r requirements-test.txt

      # Item #2: cache .mypy_cache independently.
      - uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('requirements-test.txt') }}-${{ github.sha }}
          restore-keys: mypy-${{ runner.os }}-${{ hashFiles('requirements-test.txt') }}-

      - name: Mypy (baseline-filtered)
        # MUST stay exactly as-is — mypy_baseline is strict in BOTH directions
        # (refactors that resolve entries also fail the gate). See CLAUDE.md.
        run: mypy app/ 2>&1 | python -m mypy_baseline filter --no-colors

  # ──────────────────────────────────────────────────────────────────────────
  # Item #1 / #10 — structure-job: import layers, complexity, maintainability,
  # strict-complexity, vulture. These scripts diff against origin/main so
  # fetch-depth: 0 is required.
  # ──────────────────────────────────────────────────────────────────────────
  structure-job:
    name: Structure (imports, complexity, vulture)
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.app-relevant == 'true' }}
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # complexity_strict + maintainability diff against origin/main.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test + lint dependencies
        run: pip install -r requirements-test.txt

      - name: Import boundaries
        # Local: lint-imports — contracts in .importlinter
        run: lint-imports

      - name: Complexity (repo-wide, CC ≤ 25)
        run: bash scripts/check_complexity.sh

      - name: Maintainability index (>5% drop = fail)
        run: bash scripts/check_maintainability.sh

      - name: Complexity (strict, CC ≤ 15 on changed files)
        run: bash scripts/check_complexity_strict.sh

      - name: Dead code (vulture, baselined)
        run: bash scripts/check_vulture.sh

  # ──────────────────────────────────────────────────────────────────────────
  # Item #1 — security-job: bandit, threshold parity, filter schema,
  # sqlfluff. pip-audit moved to dep-audit.yml (item #9).
  # ──────────────────────────────────────────────────────────────────────────
  security-job:
    name: Security (bandit, thresholds, filters, sqlfluff)
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.app-relevant == 'true' }}
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test + lint dependencies
        run: pip install -r requirements-test.txt

      - name: Bandit (high severity, baselined)
        run: bandit -r app/ -lll --exclude app/tests -b .bandit-baseline.json

      - name: Threshold parity (lock ↔ source ↔ doc)
        # Every numeric gate lives in three places. This check fails if
        # they disagree. See docs/testing/THRESHOLDS.md.
        run: python scripts/check_thresholds_parity.py

      - name: Filter schema sync (filters.json vs FILTER_REGISTRY)
        run: bash scripts/check_filter_schema.sh

      - name: SQL lint (sqlfluff, baselined)
        run: bash scripts/check_sqlfluff.sh

  # ──────────────────────────────────────────────────────────────────────────
  # secrets: separate job because it needs `fetch-depth: 0` and the gitleaks
  # binary (gitleaks-action requires a paid license for org repos).
  # Item #4: removed `needs: fast-checks` — gitleaks has no dependency on
  # lint/types/security and can run truly in parallel from the start.
  # ──────────────────────────────────────────────────────────────────────────
  secrets:
    name: Secret Scanning (Gitleaks)
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks

      - name: Gitleaks
        # Local: gitleaks detect --source . --verbose
        # Allowlisted fingerprints in .gitleaksignore.
        run: gitleaks detect --source . --verbose --redact

  # ──────────────────────────────────────────────────────────────────────────
  # test: pytest. Item #6: dropped `needs: fast-checks` — runs in parallel
  # with the split lint/types/structure/security jobs. Skipped on docs-only
  # PRs (changes.app-relevant=false) but always runs on push to main.
  # Item #3: dropped standalone `pytest --collect-only` step; added
  # .pytest_cache caching.
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    needs: [changes]
    if: ${{ github.event_name == 'push' || needs.changes.outputs.app-relevant == 'true' }}
    runs-on: ubuntu-latest
    # Needed by the sticky PR coverage comment step at the end. contents:read
    # is inherited; pull-requests elevated from workflow-level `read` to
    # `write` for gh pr comment / PATCH on issue comments.
    permissions:
      contents: read
      pull-requests: write
    env:
      SECRET_KEY: ci-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so diff-cover can diff against origin/main.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      # Item #3: cache .pytest_cache so collection is a noop on warm boot.
      - uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('requirements-test.txt') }}-${{ github.sha }}
          restore-keys: |
            pytest-${{ runner.os }}-${{ hashFiles('requirements-test.txt') }}-

      - name: Run unit tests
        # Routes/services tested via Postman (acceptance job). pytest scope:
        # app/utils, app/gateways, app/auth, app/security, app/i18n + smoke + policy.
        run: >
          pytest
          -m "not integration and not database and not slow"
          --ignore=app/tests/database
          --ignore=app/tests/routes
          --tb=short
          --cov=app
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=0
          -q

      - name: Diff coverage gate (changed lines only, >=80%)
        # Routes/services excluded — they're tested via Postman per CLAUDE.md.
        # app/tests/routes/** also excluded because pytest --ignore=app/tests/routes
        # above skips that directory (historical pytest tests are being migrated
        # to Postman collections). Without this exclude, any PR adding a file
        # there trips diff-cov at 0% coverage for unrun test lines.
        #
        # Restored from 50 to 80 in K-last (kitchen#66 sweep complete).
        # The temporary lowering tracked in kitchen#87 is now closed.
        run: >
          diff-cover coverage.xml
          --compare-branch=origin/main
          --fail-under=80
          --exclude "*app/routes/*" "*app/services/*" "*app/tests/routes/*" "*app/schemas/*"

      - name: Per-layer coverage floor (absolute)
        # Complements diff-cover (changed lines) with an absolute floor on
        # testable layers (utils, auth, security, gateways, i18n). Catches
        # the case where someone deletes tests without changing source code.
        # Floors baselined 2026-04-19 with ~5pt buffer below measured reality.
        # Raise in small steps via scripts/coverage_ratchet.py output.
        run: python scripts/check_coverage_floor.py

      - name: Upload coverage artifact for post-test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ github.run_id }}
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # Item #7 — post-test: CRAP analysis + sticky coverage comment moved here
  # so they run after pytest but off the test job's critical path.
  # Not in ci-pass.needs — signal-only.
  # Downloads coverage.xml artifact produced by `test` to avoid re-running
  # pytest.
  # ──────────────────────────────────────────────────────────────────────────
  post-test:
    name: Post-Test Signal (CRAP + coverage comment)
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      SECRET_KEY: ci-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Download coverage artifact from test job
        uses: actions/download-artifact@v8
        with:
          name: coverage-xml-${{ github.run_id }}
        continue-on-error: true

      - name: Post sticky PR coverage comment
        # Builds a single markdown comment from coverage.xml and updates it
        # in place on every push via an HTML marker. Non-blocking — if this
        # fails we don't want to red-flag the PR, the comment is informational.
        # Skipped on push to main (no PR number) and on forked PRs (no
        # pull-requests:write available cross-repo).
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash scripts/build_pr_coverage_comment.sh

      - name: CRAP analysis (non-blocking signal)
        # Ranks complex + under-tested functions using coverage.xml from the
        # previous step. Currently advisory only — flip to blocking once we
        # have a baseline of "tolerable CRAP" and a reduction trend on main
        # (mirrors vianda-platform's non-blocking → blocking pattern).
        # Plan to flip: when no function in app/utils, app/auth, app/security
        # exceeds CRAP > 100 for two consecutive weeks on main.
        continue-on-error: true
        run: python scripts/analyze_crap.py --top 30 || true

  # ──────────────────────────────────────────────────────────────────────────
  # acceptance: Newman against a real Postgres + uvicorn. By far the heaviest
  # job (~5+ min). Item #5 + #6: dropped `needs: fast-checks` — acceptance
  # launches at t=0 alongside all other jobs. Newman cache preserved from
  # PR #135. Skipped on docs-only PRs but always runs on push to main.
  # ──────────────────────────────────────────────────────────────────────────
  acceptance:
    name: Acceptance Tests (Newman)
    needs: [changes]
    if: ${{ github.event_name == 'push' || needs.changes.outputs.app-relevant == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        # schema.sql uses uuidv7() (built-in on Postgres 18+). Prod target is also 18.
        # postgis/postgis bundles PostGIS on top of stock postgres — required by
        # schema.sql:7 (CREATE EXTENSION postgis) for ops.restaurant_info.location.
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_USER: kitchen
          POSTGRES_PASSWORD: kitchen
          POSTGRES_DB: kitchen
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: kitchen
      DB_USER: kitchen
      DB_PASSWORD: kitchen
      PGPASSWORD: kitchen
      SECRET_KEY: ci-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DEV_MODE: "true"
      PAYMENT_PROVIDER: mock
      SUPPLIER_PAYOUT_PROVIDER: mock
      EMAIL_PROVIDER: smtp
      QR_HMAC_SECRET: ci-test-hmac-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache newman global install
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: newman-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            newman-${{ runner.os }}-

      - name: Install newman
        run: npm install -g newman

      - name: Build database (schema + seed)
        run: bash app/db/build_kitchen_db.sh

      - name: Start server
        run: |
          uvicorn application:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/server.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/docs > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8000/docs > /dev/null || { echo "Server failed to start"; exit 1; }

      - name: Run Postman collections
        # Only collections that pass on current main. Others are a known backlog:
        # NOTE: 010 archives the customer at the end (by design — see its description),
        # so it must run after every collection that needs customer login (011-014).
        # TODO: re-enable 009 — POST /customer/payment-methods/setup-session returns 500 in CI
        # (mock provider) for the fresh 000-created customer. Does not reproduce locally even
        # with PAYMENT_PROVIDER=mock. Likely a backend bug in _ensure_stripe_customer_for_mock
        # at app/routes/customer/payment_methods.py:43. Needs logs captured from CI to diagnose.
        # TODO: re-enable 012 — Create Supplier Invoice returns 500 in CI with
        # "'NoneType' object has no attribute 'model_dump'" at app/routes/billing/supplier_invoice.py:160.
        # supplier_invoice_service.get_by_id returns None immediately after insert+commit.
        # The rest of 012 runs cleanly; re-enable after this backend bug is fixed.
        # TODO: re-enable 017 (FILTER_REGISTRY_ENTITIES) — pre-existing test bugs surfaced on PR #118.
        # Two known issues: (1) URL-decode in city-match (fixed on PR #118); (2) empty-UUID in
        # plate-pickup/enriched?market_id= filter test. Audit all 017 assertions before re-enabling.
        run: bash scripts/run_newman.sh 000 001 002 003 004 005 006 007 008 011 013 014 015 016 018 010

      - name: Stop server
        if: always()
        run: |
          [ -f /tmp/server.pid ] && kill "$(cat /tmp/server.pid)" 2>/dev/null || true

  # ──────────────────────────────────────────────────────────────────────────
  # ci-pass: aggregator gate for branch protection. Point branch protection
  # at this single "CI" check instead of enumerating every job — when jobs
  # are added/renamed/split, only this `needs:` list changes, and branch
  # protection keeps working without a GitHub settings edit.
  #
  # `if: always()` so the gate evaluates even when upstream jobs are skipped
  # (e.g. docs-only PR skips test + acceptance, or paths-ignore skips all jobs).
  # The jq check passes on `success` or `skipped`; any `failure` / `cancelled`
  # fails the gate.
  #
  # post-test is intentionally excluded — it is signal-only and should not
  # gate merges.
  #
  # Auxiliary workflows (mutation.yml) are NOT covered here — their display
  # names must be added to branch protection individually.
  # ──────────────────────────────────────────────────────────────────────────
  ci-pass:
    name: CI
    if: always()
    needs: [changes, lint-job, types-job, structure-job, security-job, secrets, test, acceptance]
    runs-on: ubuntu-latest
    steps:
      # Required so `./.github/actions/notify-routine` (below) can resolve its
      # action.yml. Without it the notify step fails with "Can't find action.yml"
      # and Claude is silently never paged on CI failures.
      - uses: actions/checkout@v4

      - name: All required jobs passed or intentionally skipped
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | jq .
          echo "$results" | jq -e '[.[] | .result] | all(. == "success" or . == "skipped")' > /dev/null

      - name: Notify Claude routine on failure
        if: failure() && github.event_name == 'pull_request'
        uses: ./.github/actions/notify-routine
        with:
          routine-token: ${{ secrets.CLAUDE_CI_ROUTINE_TOKEN }}
