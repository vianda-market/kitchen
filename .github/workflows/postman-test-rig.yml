name: Postman Test Rig

# Fast iteration loop for Postman/Newman collection bugs against the existing
# dev DB — NO schema teardown. Purges demo rows scoped to dddddddd-dec0-* UUIDs
# via purge_demo_data.sh, then re-runs load_demo_data.sh to restore a clean
# demo dataset before executing the chosen test slice.
#
# Use this when iterating on collection bugs: much faster than a full db-rebuild
# because it skips migration + schema rebuild.
#
# TODO(kitchen#332): The IAP tunnel pre-check + Python + Newman install
# scaffolding below (~150 lines) is duplicated from db-rebuild.yml. Target is a
# composite action at .github/actions/iap-tunnel-with-demo-tooling/action.yml.
# Deferred — immediate need is the test rig; duplication is functional.
#
# Requires:
#   - Manual approval via GitHub Environment `dev-destructive` (same as
#     db-rebuild — required reviewers in Settings → Environments).
#   - Operator must type "RUN-TEST-RIG <environment>" in the `confirm` input.
#   - GitHub Environment vars (dev-destructive): same set as db-rebuild.yml
#       WIF_PROVIDER, DEPLOY_SA, GCP_PROJECT, DB_PRIVATE_IP,
#       IAM_ADMIN_EMAIL, KITCHEN_API_BASE_DEV
#   - GitHub repo secret: STRIPE_SECRET_KEY (sk_test_... test-mode key)
#   - GCP secret: vianda-dev-db-password
#   - Bastion VM `vianda-dev-bastion` (zone us-central1-a) reachable via IAP.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
        default: dev
      test:
        description: "Which Postman test slice to run. New options added as test rigs are written."
        required: true
        type: choice
        options:
          - stripe-payment-path
      confirm:
        description: 'Type "RUN-TEST-RIG <environment>" to proceed. Purges demo data (rows scoped to dddddddd-dec0-* UUIDs) before re-running.'
        required: true
        type: string

run-name: "Postman Test Rig — ${{ inputs.test }} on ${{ inputs.environment }} (triggered by ${{ github.actor }})"

concurrency:
  group: postman-test-rig-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  # ────────────────────────────────────────────────────────────────────
  # confirm — validate the operator typed the exact phrase before any
  # destructive work runs. All other jobs gate on this one.
  # ────────────────────────────────────────────────────────────────────
  confirm:
    name: Validate confirmation phrase
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation phrase
        run: |
          EXPECTED="RUN-TEST-RIG ${{ inputs.environment }}"
          ACTUAL="${{ inputs.confirm }}"
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "::error::Confirmation phrase mismatch."
            echo "::error::Expected: '${EXPECTED}'"
            echo "::error::Got:      '${ACTUAL}'"
            echo ""
            echo "To proceed, type exactly: RUN-TEST-RIG ${{ inputs.environment }}"
            exit 1
          fi
          echo "Confirmation phrase accepted: '${ACTUAL}'"

  # ────────────────────────────────────────────────────────────────────
  # run — purge demo rows, reload demo data, run the selected test slice.
  # ────────────────────────────────────────────────────────────────────
  run:
    name: Run ${{ inputs.test }} on ${{ inputs.environment }}
    needs: confirm
    runs-on: ubuntu-latest
    environment: dev-destructive

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      # ── IAP tunnel pre-check: validate SSH/OS Login connectivity BEFORE the
      # expensive pip install + newman install steps so a transient OS Login
      # propagation race fails fast (~10–60s) instead of burning ~3min of setup.
      # Uses port 5434 (not 5433) to avoid any collision with the main step's
      # tunnel if step ordering ever changes.  Retries up to 4 times with
      # exponential backoff (5s → 10s → 20s → 30s) so a typical propagation
      # race clears before CI declares the run failed.
      - name: Validate IAP SSH tunnel
        env:
          DB_PRIVATE_IP: ${{ vars.DB_PRIVATE_IP }}
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
        run: |
          PRECHECK_PORT=5434
          MAX_ATTEMPTS=4
          BACKOFF_SECONDS=(0 5 10 20 30)
          SUCCESS=0

          for attempt in $(seq 1 ${MAX_ATTEMPTS}); do
            SLEEP_BEFORE="${BACKOFF_SECONDS[$attempt]}"
            if [ "${attempt}" -gt 1 ]; then
              echo "Waiting ${SLEEP_BEFORE}s before retry attempt ${attempt}…"
              sleep "${SLEEP_BEFORE}"
            fi

            echo "=== IAP tunnel pre-check attempt ${attempt}/${MAX_ATTEMPTS} ==="

            # Open a background tunnel to port ${PRECHECK_PORT}; capture
            # stderr+stdout so we can surface the error on failure.
            gcloud compute ssh vianda-dev-bastion \
              --project="${GCP_PROJECT}" \
              --zone=us-central1-a \
              --tunnel-through-iap \
              --ssh-flag="-L ${PRECHECK_PORT}:${DB_PRIVATE_IP}:5432" \
              --ssh-flag="-N" \
              --ssh-flag="-o StrictHostKeyChecking=no" \
              &> /tmp/iap_precheck_ssh.log &
            PRECHECK_PID=$!
            # shellcheck disable=SC2064
            trap "kill ${PRECHECK_PID} 2>/dev/null; wait ${PRECHECK_PID} 2>/dev/null" EXIT

            # Wait for the tunnel to accept connections (up to 20s).
            # If the SSH process dies early (e.g. auth failure), break
            # immediately rather than waiting the full 20s.
            TUNNEL_UP=0
            for _i in $(seq 1 20); do
              if ! kill -0 "${PRECHECK_PID}" 2>/dev/null; then
                echo "SSH process exited early on attempt ${attempt}."
                cat /tmp/iap_precheck_ssh.log || true
                break
              fi
              if nc -z 127.0.0.1 "${PRECHECK_PORT}" 2>/dev/null; then
                TUNNEL_UP=1
                break
              fi
              sleep 1
            done

            if [ "${TUNNEL_UP}" -eq 0 ]; then
              echo "Tunnel did not come up on attempt ${attempt}."
              kill "${PRECHECK_PID}" 2>/dev/null
              wait "${PRECHECK_PID}" 2>/dev/null || true
              trap - EXIT
              continue
            fi

            # Tunnel is up — fetch DB password and run a trivial connectivity check.
            PGPASSWORD=$(gcloud secrets versions access latest \
              --secret="vianda-dev-db-password" --project="${GCP_PROJECT}")

            if PGPASSWORD="${PGPASSWORD}" psql \
                --host=127.0.0.1 --port="${PRECHECK_PORT}" \
                --username=kitchen_app --dbname=kitchen \
                --no-password --tuples-only \
                --command="SELECT 1" 2>/tmp/iap_precheck_psql.log; then
              echo "IAP tunnel + OS Login validated on attempt ${attempt}."
              SUCCESS=1
              kill "${PRECHECK_PID}" 2>/dev/null
              wait "${PRECHECK_PID}" 2>/dev/null || true
              trap - EXIT
              break
            else
              echo "psql connectivity check failed on attempt ${attempt}:"
              cat /tmp/iap_precheck_psql.log || true
              kill "${PRECHECK_PID}" 2>/dev/null
              wait "${PRECHECK_PID}" 2>/dev/null || true
              trap - EXIT
            fi
          done

          if [ "${SUCCESS}" -ne 1 ]; then
            echo "::error::IAP tunnel auth failed after ${MAX_ATTEMPTS} attempts."
            echo "::error::Likely causes: (1) OS Login key propagation race — re-run the workflow;"
            echo "::error::(2) deploy SA missing roles/iap.tunnelResourceAccessor or roles/compute.osLogin;"
            echo "::error::(3) WIF_PROVIDER or DEPLOY_SA vars misconfigured."
            cat /tmp/iap_precheck_ssh.log || true
            exit 1
          fi

      # ── Python: needed by load_demo_data.sh to hash the demo admin password
      # via app.auth.security.hash_password (passlib + bcrypt).
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Newman: needed by load_demo_data.sh Layer B (900 demo collection)
      # and by the test slice itself.
      # Mirrors the cache + install pattern from ci.yml acceptance job.
      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Cache newman global install
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: newman-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            newman-${{ runner.os }}-

      - name: Install newman
        run: npm install -g newman

      - name: Open IAP SSH tunnel + purge + reload + run test slice
        env:
          DB_PRIVATE_IP: ${{ vars.DB_PRIVATE_IP }}
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
          IAM_ADMIN_EMAIL: ${{ vars.IAM_ADMIN_EMAIL }}
          # KITCHEN_API_BASE_DEV: deployed dev Cloud Run URL (e.g. https://api.dev.vianda.market).
          # Exported as KITCHEN_API_BASE for load_demo_data.sh (env-name agnostic to target).
          KITCHEN_API_BASE: ${{ vars.KITCHEN_API_BASE_DEV }}
          # STRIPE_SECRET_KEY: Stripe sandbox test key (sk_test_...).
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          # Skip pytest — covered by the separate ci.yml gate.
          SKIP_PYTEST: "1"
          TEST_SLICE: ${{ inputs.test }}
        run: |
          gcloud compute ssh vianda-dev-bastion \
            --project="${GCP_PROJECT}" \
            --zone=us-central1-a \
            --tunnel-through-iap \
            --ssh-flag="-L 5433:${DB_PRIVATE_IP}:5432" \
            --ssh-flag="-N" \
            --ssh-flag="-o StrictHostKeyChecking=no" &
          TUNNEL_PID=$!
          trap "kill ${TUNNEL_PID} 2>/dev/null" EXIT
          for i in $(seq 1 20); do nc -z 127.0.0.1 5433 && break; sleep 1; done

          PGPASSWORD=$(gcloud secrets versions access latest \
            --secret="vianda-dev-db-password" --project="${GCP_PROJECT}")

          case "${TEST_SLICE}" in
            stripe-payment-path)
              echo "=== Purging demo data (dddddddd-dec0-* rows) ==="
              DB_HOST=127.0.0.1 DB_PORT=5433 DB_NAME=kitchen \
                DB_USER=kitchen_app PGPASSWORD="${PGPASSWORD}" \
                bash scripts/purge_demo_data.sh

              echo "=== Reloading demo data via load_demo_data.sh --target=gcp-dev ==="
              DB_HOST=127.0.0.1 DB_PORT=5433 DB_NAME=kitchen \
                DB_USER=kitchen_app PGPASSWORD="${PGPASSWORD}" ENV=dev \
                IAM_ADMIN_EMAIL="${IAM_ADMIN_EMAIL}" \
                KITCHEN_API_BASE="${KITCHEN_API_BASE}" \
                STRIPE_SECRET_KEY="${STRIPE_SECRET_KEY}" \
                bash scripts/load_demo_data.sh --target=gcp-dev
              ;;
            *)
              echo "::error::unknown test slice: ${TEST_SLICE}"
              exit 1
              ;;
          esac

      # ── Upload demo credentials as an artifact so the demo admin password
      # can be retrieved after the run. if: always() captures credentials even
      # if a later assertion fails partway through.
      - name: Upload demo credentials artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: demo-credentials-${{ github.run_id }}
          path: .demo_credentials.local
          retention-days: 90

      - name: Summary
        if: always()
        run: |
          echo "## Postman Test Rig — ${{ inputs.test }} on ${{ inputs.environment }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Demo credentials uploaded as artifact \`demo-credentials-${{ github.run_id }}\`." >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Download via the Actions tab → this run → Artifacts, or:" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
          echo "gh run download ${{ github.run_id }} -R vianda-market/kitchen" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
