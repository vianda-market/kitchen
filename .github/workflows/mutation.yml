name: Mutation Testing

on:
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
  # Weekly schedule — Sunday midnight UTC
  schedule:
    - cron: "0 0 * * 0"

jobs:
  mutate:
    name: Mutation Tests (Tier 1)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run mutation tests
        run: mutmut run

      - name: Show results
        if: always()
        run: mutmut results

      - name: Check for survivors
        if: always()
        run: |
          survivors=$(mutmut results 2>&1 | grep -c "survived" || true)
          echo "Survived mutants: $survivors"
          if [ "$survivors" -gt 0 ]; then
            echo ""
            echo "::warning::$survivors mutant(s) survived — tests did not catch these code mutations"
            echo ""
            echo "Run 'mutmut show <name>' locally to inspect each survivor"
          fi
