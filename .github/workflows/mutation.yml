name: Mutation Testing

# Mutation testing against Tier 1 critical business logic (money/credits).
# Scope and tool: see [tool.mutmut] in pyproject.toml.
#
# Two modes:
#   - pull_request (path-scoped): incremental run; restores the cache built
#     by the last push to main and re-mutates only what's changed.
#   - push: main: refreshes the cache so subsequent PRs start warm.
#   - workflow_dispatch: manual re-runs (rebaselines, config changes).
#
# No `schedule:` cron. Drift is caught by per-PR + per-main-push runs.
#
# Seeding: no ceremony needed. The initial cold run on main took 2m49s for
# Tier-1 scope (790 mutants) — well inside the 60-min default. A seeding
# PR was attempted (PR #29, timeout bumped to 360) but that was predicated
# on a Stryker assumption that doesn't hold for mutmut at this scope.
#
# Forked-PR caveat: GitHub Actions cannot read cache across repo boundaries,
# so forked PRs do a cold re-run (slow). All Vianda repos are private today,
# so this is a non-issue.

on:
  pull_request:
    branches: [main]
    # NOTE: no top-level `paths:` filter. This workflow is a required
    # branch-protection check; if it filtered at the workflow level, PRs that
    # don't touch mutation paths would never trigger it and the required check
    # would stay pending forever, blocking merge. Instead, trigger on every PR
    # and gate the heavy work with a dorny/paths-filter step inside the job
    # (see `filter` step below), then always run a terminal step so the job
    # reports a conclusion even on skip.
  push:
    branches: [main]
    paths:
      - "app/services/credit_validation_service.py"
      - "app/services/credit_loading_service.py"
      - "app/services/discretionary_service.py"
      - "app/tests/services/**"
      - "pyproject.toml"
      - ".github/workflows/mutation.yml"
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutate:
    name: Mutation Tests (Tier 1)
    runs-on: ubuntu-latest
    # Cold Tier-1 run measured at 2m49s; incremental runs are faster.
    timeout-minutes: 60
    env:
      SECRET_KEY: ci-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    steps:
      - uses: actions/checkout@v6

      # Gate heavy work on the same path list that used to be at the workflow
      # level. Keep in sync with [tool.mutmut].paths_to_mutate in pyproject.toml.
      # On `push` events there is no PR base to diff against, so dorny returns
      # true for every key — that's fine, push to main should always run.
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            relevant:
              - 'app/services/credit_validation_service.py'
              - 'app/services/credit_loading_service.py'
              - 'app/services/discretionary_service.py'
              - 'app/tests/services/**'
              - 'pyproject.toml'
              - '.github/workflows/mutation.yml'

      - uses: actions/setup-python@v6
        if: steps.filter.outputs.relevant == 'true'
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        if: steps.filter.outputs.relevant == 'true'
        run: pip install -r requirements-test.txt

      # Restore mutmut's cache. On PRs, the restore-keys fallback to the
      # latest main-branch cache so PR runs don't start cold. On push to
      # main, this writes the fresh cache back (see cache-hit logic below).
      - name: Restore mutmut cache
        if: steps.filter.outputs.relevant == 'true'
        uses: actions/cache@v5
        with:
          # mutmut 3.x stores all state (incremental + HTML report) in the
          # `mutants/` directory. The mutmut-2 name `.mutmut-cache/` is
          # obsolete and caused silent "Path does not exist" warnings on
          # the first main run — cache was never written.
          # Cache key bumped to v2 after the plate→vianda rename (kitchen#273):
          # stale main-branch caches still contained `mutants/app/tests/services/
          # test_plate_pickup_service.py` that ImportError'd against the renamed
          # source. The bump invalidates pre-rename caches across all branches.
          path: mutants
          key: mutmut-v2-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            mutmut-v2-${{ github.ref }}-
            mutmut-v2-refs/heads/main-

      - name: Run mutation tests
        # mutmut run is incremental by default: files it has already seen
        # are skipped unless the source or tests changed. The cache hydrated
        # above is what makes PR runs fast.
        if: steps.filter.outputs.relevant == 'true'
        run: mutmut run

      - name: Results summary
        if: always() && steps.filter.outputs.relevant == 'true'
        run: mutmut results

      - name: Write GitHub step summary
        # Surface the headline score + any survivors directly in the PR's
        # Actions tab — nobody reads the HTML report otherwise.
        if: always() && steps.filter.outputs.relevant == 'true'
        run: |
          {
            echo "## Mutation Testing — Tier 1 Results"
            echo ""
            echo "**Scope:** credit_validation, credit_loading, discretionary"
            echo ""
            echo "\`\`\`"
            mutmut results 2>&1 | head -100
            echo "\`\`\`"
            survivors=$(mutmut results 2>&1 | grep -cE "^  [0-9]+-[0-9]+$|^[0-9]+$" || true)
            if [ "${survivors:-0}" -gt 0 ]; then
              echo ""
              echo "⚠️ **Survivors present.** Run \`mutmut show <id>\` locally to inspect each one."
            else
              echo ""
              echo "✅ All mutants killed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dump results to text file
        # mutmut 3.x has no `html` subcommand (that was mutmut 2). We upload
        # the plain `results` output plus the `mutants/` cache — together
        # these let a reviewer run `mutmut show <id>` / `mutmut browse`
        # locally against the CI's verdicts without re-running the suite.
        if: always() && steps.filter.outputs.relevant == 'true'
        run: mutmut results > mutmut-results.txt || true

      - name: Upload mutation artifacts
        if: always() && steps.filter.outputs.relevant == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: mutmut-report-${{ github.run_id }}
          path: |
            mutmut-results.txt
            mutants/
          if-no-files-found: ignore
          retention-days: 30

      - name: Enforce kill-rate threshold
        # Blocking gate. Threshold source of truth: docs/testing/THRESHOLDS.md.
        # Equivalent mutants (log-message text, HTTPException detail strings,
        # etc. — see docs/testing/MUTATION_TRIAGE.md) are excluded from the
        # denominator via docs/testing/mutation-equivalents.txt.
        #
        # `mutmut results` only lists non-killed mutants, so a naïve grep on
        # ": killed$" always returns 0. `mutmut export-cicd-stats` writes a
        # structured JSON (mutants/mutmut-cicd-stats.json) with all counts,
        # which is what this step reads.
        if: steps.filter.outputs.relevant == 'true'
        env:
          KILL_RATE_MIN: "65"
          EQUIV_FILE: docs/testing/mutation-equivalents.txt
        run: |
          mutmut export-cicd-stats
          stats=mutants/mutmut-cicd-stats.json
          killed=$(python3 -c "import json; print(json.load(open('$stats'))['killed'])")
          survived=$(python3 -c "import json; print(json.load(open('$stats'))['survived'])")
          no_tests=$(python3 -c "import json; print(json.load(open('$stats'))['no_tests'])")
          equivalent=0
          if [ -f "$EQUIV_FILE" ]; then
            equivalent=$(wc -l < "$EQUIV_FILE" | tr -d ' ')
          fi
          effective_total=$((killed + survived - equivalent))
          if [ "$effective_total" -le 0 ]; then
            echo "::error::effective_total=${effective_total} — nothing to score (killed=${killed}, survived=${survived}, equivalent=${equivalent})"
            exit 1
          fi
          rate=$(( (killed * 100) / effective_total ))
          echo "killed=${killed} survived=${survived} no_tests=${no_tests} equivalent=${equivalent}"
          echo "effective kill-rate: ${rate}% (threshold: ${KILL_RATE_MIN}%)"
          if [ "$rate" -lt "$KILL_RATE_MIN" ]; then
            echo "::error::Kill rate ${rate}% is below threshold ${KILL_RATE_MIN}%. See docs/testing/MUTATION_TRIAGE.md."
            exit 1
          fi

      # Terminal step — runs unconditionally so the job always reports a
      # conclusion. Without this, a PR that doesn't touch mutation paths would
      # have ALL steps skipped, and some branch-protection configs treat a
      # fully-skipped job as pending rather than success, blocking merge.
      - name: Mutation check complete
        if: always()
        run: |
          if [ "${{ steps.filter.outputs.relevant }}" = "true" ]; then
            echo "Mutation tests ran (see steps above)."
          else
            echo "Mutation tests skipped — no Tier-1 paths changed in this PR."
          fi

      - name: Notify Claude routine on failure
        if: failure() && github.event_name == 'pull_request'
        uses: ./.github/actions/notify-routine
        with:
          routine-token: ${{ secrets.CLAUDE_CI_ROUTINE_TOKEN }}
