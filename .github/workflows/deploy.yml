name: Deploy Kitchen Backend

# Builds the Docker image, pushes it to Artifact Registry, and rolls a new
# Cloud Run revision on the dev service.
#
# Triggers:
#   - pull_request: closed + merged + has `deploy:dev` label → auto-deploy
#     the merged commit (checked out via pull_request.base.ref = main).
#   - workflow_dispatch (reason required) → manual deploy for infra validation
#     or rollback. `github.ref` is the deploy target, so picking an older SHA
#     from the Actions UI rolls back.
#
# Not gated on push to main: per 2026-04-20 pattern roundup we only ship PRs
# that explicitly carry the deploy:dev label — most merges to main (docs,
# refactors, tests) should not auto-ship.
#
# Prereqs (one-time, per infra-kitchen-gcp/docs/plans/ci-cd-activation-manual.md):
#   - GitHub Environment `dev` with vars: WIF_PROVIDER, DEPLOY_SA, GCP_PROJECT,
#     CLOUD_RUN_SERVICE.
#   - `deploy:dev` label created (see README / architecture doc).
#   - WIF pool/provider provisioned on infra dev stack (`pulumi up` on dev).

on:
  # PR triggers cover two concerns:
  #   - opened/synchronize/reopened/labeled/unlabeled → run detect-changes +
  #     require-deploy-label so a PR touching deploy-affecting paths without
  #     the deploy:dev label fails CI before merge.
  #   - closed → run the deploy job iff merged + deploy:dev label.
  # No top-level paths filter — branch protection requires
  # `Require deploy:dev label` by NAME, and `paths-ignore` would leave the
  # check pending forever on excluded PRs (the trap CLAUDE.md warns about).
  # Path filtering is handled inside detect-changes via dorny/paths-filter.
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled, closed]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this manual deploy? (e.g. 'infra validation', 'rollback to <sha>')"
        required: true
        type: string

run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && format('Manual deploy from {0} — {1}', github.ref_name, inputs.reason)
      || '' }}

# Fixed group (not per-ref) so manual + PR-merge runs serialize on the same
# Cloud Run service. cancel-in-progress=false because interrupting a half-rolled
# revision is worse than queuing.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write       # WIF federation
  pull-requests: write  # update marker comment on the merged PR

env:
  REGISTRY: us-central1-docker.pkg.dev
  REGION: us-central1

jobs:
  # Detects whether this PR touches deploy-affecting paths. Skipped on `closed`
  # — the deploy job uses the label as opt-in, not path detection. Used by the
  # require-deploy-label guardrail below.
  detect-changes:
    name: Detect deploy-affecting path changes
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
      - name: Check for deploy-affecting paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            relevant:
              - "app/**"
              - "application.py"
              - "requirements*.txt"
              - "requirements*.lock"
              - "Dockerfile"
              - "scripts/**"
              - "docs/postman/**"
              - ".github/workflows/deploy.yml"

  # Guardrail: PRs that touch deploy-affecting paths MUST carry the
  # `deploy:dev` label. Mirrors `infra-kitchen-gcp/.github/workflows/deploy.yml`.
  # Docs-only PRs pass without the label automatically.
  #
  # Promote to a required check via Settings → Branches → main → Require status
  # checks → "Require deploy:dev label" once seen green on a docs PR and red on
  # a forgotten-label PR.
  require-deploy-label:
    name: Require deploy:dev label
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: [detect-changes]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check label
        env:
          RELEVANT: ${{ needs.detect-changes.outputs.relevant }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$RELEVANT" != "true" ]; then
            echo "PR touches no deploy-affecting paths — deploy:dev label not required."
            exit 0
          fi
          # Query labels at job runtime, not from the trigger payload, because
          # auto-label-deploy.yml runs in parallel and mutates labels via the API
          # after the trigger fires; reading github.event.pull_request.labels
          # here races auto-apply and falsely fails on first PR open.
          LABELS=$(gh api "repos/$REPO/issues/$PR_NUMBER/labels" --jq '[.[].name]')
          if echo "$LABELS" | grep -q '"deploy:dev"'; then
            echo "deploy:dev label present — Cloud Run dev deploy will run on merge."
            exit 0
          fi
          echo "::error::This PR touches deploy-affecting paths (app/, application.py, requirements*, Dockerfile, scripts/, docs/postman/, deploy.yml) but is missing the 'deploy:dev' label."
          echo "::error::Either (a) add the deploy:dev label so the dev deploy runs on merge, or (b) split the deploy-affecting changes out if this should be docs-only."
          echo "::error::Add the label with: gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label deploy:dev"
          exit 1

  deploy:
    name: Build + Deploy to dev
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'closed' &&
       github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy:dev'))
    runs-on: ubuntu-latest
    environment: dev
    steps:
      # ───── In-progress PR marker (PR-merge path only) ─────
      - name: Post in-progress deploy marker
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- cloud-run-deploy-dev -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}\n⏳ Deploying to dev… ([view run](${runUrl}))`;
            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: prNumber, body });
            }

      # ───── Checkout target commit ─────
      # PR-merge path: base.ref = main (post-merge HEAD is the merged commit).
      # Manual path: github.ref (defaults to main, accepts older SHAs for rollback).
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref }}

      # ───── GCP auth via Workload Identity Federation ─────
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ───── Build + push image ─────
      - name: Build and push image
        id: build
        run: |
          TAG="${GITHUB_SHA::7}-$(date +%Y%m%d%H%M%S)"
          IMAGE="${{ env.REGISTRY }}/${{ vars.GCP_PROJECT }}/kitchen/kitchen-backend:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # ───── Roll Cloud Run revision ─────
      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ vars.CLOUD_RUN_SERVICE }} \
            --image "${{ steps.build.outputs.image }}" \
            --region ${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT }}

      # ───── Run incremental migrations (dev only) ─────
      # TECH DEBT: DB_PRIVATE_IP is a manual GitHub Environment var (the private
      # IP of the dev Cloud SQL instance). Ideally this comes from a Pulumi stack
      # output once stack-output plumbing is wired up (issue #54).
      - name: Run migrations via IAP SSH tunnel
        env:
          DB_PRIVATE_IP: ${{ vars.DB_PRIVATE_IP }}
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
        run: |
          gcloud compute ssh vianda-dev-bastion \
            --project="${GCP_PROJECT}" \
            --zone=us-central1-a \
            --tunnel-through-iap \
            --ssh-flag="-L 5433:${DB_PRIVATE_IP}:5432" \
            --ssh-flag="-N" \
            --ssh-flag="-o StrictHostKeyChecking=no" &
          TUNNEL_PID=$!
          trap "kill ${TUNNEL_PID} 2>/dev/null" EXIT
          for i in $(seq 1 20); do nc -z 127.0.0.1 5433 && break; sleep 1; done
          PGPASSWORD=$(gcloud secrets versions access latest \
            --secret="vianda-dev-db-password" --project="${GCP_PROJECT}")
          DB_HOST=127.0.0.1 DB_PORT=5433 DB_NAME=kitchen \
            DB_USER=kitchen_app PGPASSWORD="${PGPASSWORD}" \
            bash app/db/migrate.sh

      # ───── Intermediate PR marker (deploy stage finished, smoke pending) ─────
      # On deploy failure this is the final word — smoke won't run. On deploy
      # success the marker says "smoke pending" and the notify-finish job below
      # overwrites it once smoke completes.
      - name: Post deploy-stage marker
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- cloud-run-deploy-dev -->';
            const ok = '${{ job.status }}' === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const tag = '${{ steps.build.outputs.tag }}';
            const body = ok
              ? `${marker}\n🟡 Deployed to dev — image tag \`${tag}\` ([view run](${runUrl})) · smoke check running…`
              : `${marker}\n❌ Deploy to dev failed ([view run](${runUrl}))`;
            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: prNumber, body });
            }

  smoke:
    name: Post-deploy smoke
    needs: deploy
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Smoke test new revision
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
          SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
          REGION: us-central1
          PUBLIC_URL: https://api.dev.vianda.market
        run: |
          set -euo pipefail

          # Wait up to 30s for traffic to settle on the new revision
          TRAFFIC=0
          for _attempt in $(seq 1 6); do
            TRAFFIC=$(gcloud run services describe "$SERVICE" \
              --region="$REGION" --project="$GCP_PROJECT" \
              --format='value(status.traffic[0].percent)' 2>/dev/null || echo 0)
            if [ "$TRAFFIC" = "100" ]; then break; fi
            echo "Traffic at ${TRAFFIC}%, retrying in 5s..."
            sleep 5
          done

          REVISION=$(gcloud run services describe "$SERVICE" \
            --region="$REGION" --project="$GCP_PROJECT" \
            --format='value(status.latestReadyRevisionName)')

          # Endpoint checks
          health_status=$(curl -s -o /tmp/health.json -w "%{http_code}" "$PUBLIC_URL/health")
          docs_status=$(curl -s -o /dev/null -w "%{http_code}" "$PUBLIC_URL/docs")
          openapi_status=$(curl -s -o /tmp/openapi.json -w "%{http_code}" "$PUBLIC_URL/openapi.json")
          paths_count=$(jq '.paths | length' /tmp/openapi.json 2>/dev/null || echo "?")

          # Write step summary (Markdown table)
          {
            echo "## Post-deploy smoke (dev)"
            echo ""
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| Revision | \`$REVISION\` at ${TRAFFIC}% traffic |"
            echo "| \`/health\` | HTTP $health_status |"
            echo "| \`/docs\` | HTTP $docs_status |"
            echo "| \`/openapi.json\` | HTTP $openapi_status, $paths_count paths registered |"
            echo ""
            echo "Reference: \`docs/commands/kitchen_smoketest.md\` (orchestrator-side, see the manual portion for the post-deploy 15-min watch)."
          } >> "$GITHUB_STEP_SUMMARY"

          # Fail the job if any check is bad
          if [ "$TRAFFIC" != "100" ]; then echo "::error::Traffic not at 100%, got $TRAFFIC"; exit 1; fi
          if [ "$health_status" != "200" ]; then echo "::error::/health returned $health_status"; exit 1; fi
          if [ "$docs_status" != "200" ]; then echo "::error::/docs returned $docs_status"; exit 1; fi
          if [ "$openapi_status" != "200" ]; then echo "::error::/openapi.json returned $openapi_status"; exit 1; fi
          echo "All smoke checks passed."

  # Finalize the PR marker once smoke has resolved. Without this job the
  # deploy-stage marker would stay "smoke check running…" forever (success) or
  # falsely claim ✅ when smoke failed. Only runs when smoke actually ran —
  # i.e. when deploy succeeded; the deploy-stage marker already covers
  # deploy-failed cases. Workflow_dispatch is skipped because the deploy job's
  # PR-comment steps already gate on github.event_name == 'pull_request'.
  notify-finish:
    name: Finalize PR deploy marker
    needs: [deploy, smoke]
    if: always() && github.event_name == 'pull_request' && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Update final marker with smoke result
        uses: actions/github-script@v9
        env:
          SMOKE_RESULT: ${{ needs.smoke.result }}
        with:
          script: |
            const marker = '<!-- cloud-run-deploy-dev -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const smoke = process.env.SMOKE_RESULT;
            const prNumber = context.payload.pull_request.number;
            let line;
            if (smoke === 'success') {
              line = `✅ Deployed to dev — smoke checks passed ([view run](${runUrl}))`;
            } else if (smoke === 'failure') {
              line = `❌ Deployed to dev — smoke checks FAILED ([view run](${runUrl}))`;
            } else {
              line = `⚠️ Deployed to dev — smoke result \`${smoke}\` ([view run](${runUrl}))`;
            }
            const body = `${marker}\n${line}`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: prNumber, body });
            }
