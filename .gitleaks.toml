# Custom gitleaks config — extends the default ruleset.
#
# Without this file gitleaks uses its built-in default rules; with it, we still
# inherit those rules via [extend]. The block below adds a project-wide
# allowlist for canonical_key fixtures generated by the upsert seed pattern
# introduced in issue #190 (kitchen).
#
# These strings (E2E_PKD_*, E2E_QR_*, E2E_INSTITUTION_*, E2E_USER_*, etc.)
# look like high-entropy tokens to gitleaks but are stable, well-known
# fixture identifiers — never secrets. The allowlist is path-scoped to the
# predictable surface area where these fixtures legitimately appear so we
# don't accidentally hide real leaks elsewhere.

[extend]
useDefault = true

[[allowlists]]
description = "E2E canonical_key fixtures (issue #190 — Vianda canonical-fixture seed pattern)"
paths = [
    '''app/tests/routes/test_.*_upsert_by_key\.py''',
    '''docs/postman/collections/.*\.postman_collection\.json''',
    '''app/db/migrations/.*_canonical_key\.sql''',
    '''scripts/cleanup_duplicate_.*\.py''',
    '''docs/api/internal/UPSERT_SEED_CONVENTION\.md''',
]
regexes = ['''E2E_[A-Z][A-Z0-9_]*''']
