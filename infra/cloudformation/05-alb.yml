AWSTemplateFormatVersion: '2010-09-09'
Description: 'Kitchen Application Load Balancer - Multi-application routing'

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name
  
  NetworkStackName:
    Type: String
    Default: kitchen-network-prod
    Description: Name of the network stack to import values from
  
  ComputeStackName:
    Type: String
    Default: kitchen-compute-prod
    Description: Name of the compute stack to import EC2 instance
  
  CertificateArn:
    Type: String
    Default: ''
    Description: (Optional) ARN of SSL certificate in ACM for HTTPS

Conditions:
  HasSSLCertificate: !Not [!Equals [!Ref CertificateArn, '']]

Resources:
  # Application Load Balancer
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub 'kitchen-alb-${Environment}'
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - Fn::ImportValue: !Sub '${NetworkStackName}-PublicSubnet1'
        - Fn::ImportValue: !Sub '${NetworkStackName}-PublicSubnet2'
      SecurityGroups:
        - Fn::ImportValue: !Sub '${NetworkStackName}-ALBSecurityGroup'
      Tags:
        - Key: Name
          Value: !Sub 'kitchen-alb-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: Kitchen

  # Target Group for Backend API
  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'kitchen-backend-tg-${Environment}'
      Port: 8000
      Protocol: HTTP
      VpcId:
        Fn::ImportValue: !Sub '${NetworkStackName}-VPC'
      TargetType: instance
      
      # Health Check Configuration
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200
      
      # Connection Settings
      Deregistration Delay: 30
      
      Tags:
        - Key: Name
          Value: !Sub 'kitchen-backend-tg-${Environment}'
        - Key: Environment
          Value: !Ref Environment

  # Register EC2 Instance with Target Group
  BackendTargetGroupAttachment:
    Type: AWS::ElasticLoadBalancingV2::TargetGroupAttachment
    Properties:
      TargetGroupArn: !Ref BackendTargetGroup
      TargetId:
        Fn::ImportValue: !Sub '${ComputeStackName}-InstanceId'
      Port: 8000

  # HTTP Listener (redirect to HTTPS if certificate available)
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasSSLCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref BackendTargetGroup

  # HTTPS Listener (only if certificate provided)
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasSSLCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      SslPolicy: ELBSecurityPolicy-TLS-1-2-2017-01
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # Listener Rules for API routing
  BackendAPIRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !If 
        - HasSSLCertificate
        - !Ref HTTPSListener
        - !Ref HTTPListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values:
            - /api/*
            - /health
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # CloudWatch Alarms
  
  # High 5XX Error Rate
  ALBHigh5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'kitchen-alb-high-5xx-${Environment}'
      AlarmDescription: Alert when ALB 5xx errors exceed threshold
      MetricName: HTTPCode_Target_5XX_Count
      Namespace: AWS/ApplicationELB
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      TreatMissingData: notBreaching

  # Unhealthy Target
  ALBUnhealthyTargetAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'kitchen-alb-unhealthy-target-${Environment}'
      AlarmDescription: Alert when backend target is unhealthy
      MetricName: UnHealthyHostCount
      Namespace: AWS/ApplicationELB
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
        - Name: TargetGroup
          Value: !GetAtt BackendTargetGroup.TargetGroupFullName
      TreatMissingData: notBreaching

  # High Response Time
  ALBHighResponseTimeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'kitchen-alb-high-response-time-${Environment}'
      AlarmDescription: Alert when API response time exceeds 1 second (p95)
      MetricName: TargetResponseTime
      Namespace: AWS/ApplicationELB
      ExtendedStatistic: p95
      Period: 300
      EvaluationPeriods: 2
      Threshold: 1.0
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      TreatMissingData: notBreaching

Outputs:
  LoadBalancerDNS:
    Description: ALB DNS name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-LoadBalancerDNS'

  LoadBalancerArn:
    Description: ALB ARN
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub '${AWS::StackName}-LoadBalancerArn'

  BackendTargetGroupArn:
    Description: Backend Target Group ARN
    Value: !Ref BackendTargetGroup
    Export:
      Name: !Sub '${AWS::StackName}-BackendTargetGroupArn'

  APIEndpoint:
    Description: API endpoint URL
    Value: !Sub 
      - '${Protocol}://${DNS}/api/v1'
      - Protocol: !If [HasSSLCertificate, 'https', 'http']
        DNS: !GetAtt ApplicationLoadBalancer.DNSName

  HealthCheckEndpoint:
    Description: Health check endpoint
    Value: !Sub 
      - '${Protocol}://${DNS}/health'
      - Protocol: !If [HasSSLCertificate, 'https', 'http']
        DNS: !GetAtt ApplicationLoadBalancer.DNSName
