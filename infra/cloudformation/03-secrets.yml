AWSTemplateFormatVersion: '2010-09-09'
Description: 'Kitchen Secrets Manager - API Keys, Credentials, Configuration'

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name
  
  DatabaseStackName:
    Type: String
    Default: kitchen-database-prod
    Description: Name of the database stack to import DB endpoint

Resources:
  # Database Credentials Secret
  DatabaseCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'kitchen/${Environment}/database/credentials'
      Description: Kitchen database connection credentials
      SecretString: !Sub 
        - |
          {
            "engine": "postgres",
            "host": "${DBEndpoint}",
            "port": 5432,
            "username": "${DBUsername}",
            "password": "PLACEHOLDER_UPDATE_AFTER_DEPLOYMENT",
            "database": "${DBName}",
            "connection_string": "postgresql://${DBUsername}:PASSWORD@${DBEndpoint}:5432/${DBName}"
          }
        - DBEndpoint:
            Fn::ImportValue: !Sub '${DatabaseStackName}-DBEndpoint'
          DBUsername:
            Fn::ImportValue: !Sub '${DatabaseStackName}-DBUsername'
          DBName:
            Fn::ImportValue: !Sub '${DatabaseStackName}-DBName'
      Tags:
        - Key: Name
          Value: !Sub 'kitchen-db-credentials-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: 'kitchen-backend'
        - Key: ManagedBy
          Value: CloudFormation

  # Backend API Keys Secret
  BackendAPIKeysSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'kitchen/${Environment}/backend/api-keys'
      Description: Kitchen backend API keys and secrets
      SecretString: !Sub |
        {
          "jwt_secret": "PLACEHOLDER_GENERATE_64_CHAR_RANDOM_STRING",
          "jwt_algorithm": "HS256",
          "jwt_expiry_hours": 24,
          "google_maps_api_key": "PLACEHOLDER_FROM_GOOGLE_CLOUD_CONSOLE",
          "mercadopago_client_id": "PLACEHOLDER_FROM_MERCADOPAGO_DASHBOARD",
          "mercadopago_client_secret": "PLACEHOLDER_FROM_MERCADOPAGO_DASHBOARD",
          "mercadopago_access_token": "PLACEHOLDER_FROM_MERCADOPAGO_DASHBOARD"
        }
      Tags:
        - Key: Name
          Value: !Sub 'kitchen-backend-api-keys-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: 'kitchen-backend'
        - Key: Note
          Value: 'Update placeholders after deployment'

  # Email Configuration Secret (Gmail SMTP for MVP, AWS SES later)
  EmailConfigSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'kitchen/${Environment}/email/config'
      Description: Email service configuration (Gmail SMTP for MVP)
      SecretString: !Sub |
        {
          "email_provider": "gmail",
          "smtp_host": "smtp.gmail.com",
          "smtp_port": 587,
          "smtp_use_tls": true,
          "smtp_username": "PLACEHOLDER_YOUR_GMAIL_ADDRESS",
          "smtp_password": "PLACEHOLDER_GMAIL_APP_SPECIFIC_PASSWORD",
          "from_email": "PLACEHOLDER_YOUR_GMAIL_ADDRESS",
          "from_name": "Kitchen Backend",
          "password_reset_url_template": "https://kitchen.com/reset-password?token={token}"
        }
      Tags:
        - Key: Name
          Value: !Sub 'kitchen-email-config-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Note
          Value: 'Gmail SMTP for MVP. Migrate to AWS SES post-UAT.'
        - Key: Documentation
          Value: 'https://support.google.com/accounts/answer/185833'

  # Application Configuration Secret
  AppConfigSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'kitchen/${Environment}/app/config'
      Description: Application-level configuration
      SecretString: !Sub |
        {
          "environment": "${Environment}",
          "debug": false,
          "cors_origins": ["https://kitchen.com", "https://app.kitchen.com", "http://localhost:3000"],
          "api_base_url": "https://api.kitchen.com",
          "session_timeout_minutes": 60,
          "password_reset_token_expiry_hours": 24,
          "password_min_length": 8,
          "geolocation_provider": "google",
          "geolocation_api_key": "USE_FROM_backend/api-keys",
          "max_upload_size_mb": 10,
          "rate_limit_per_minute": 100
        }
      Tags:
        - Key: Name
          Value: !Sub 'kitchen-app-config-${Environment}'
        - Key: Environment
          Value: !Ref Environment

  # IAM Policy for EC2 to Read Secrets
  EC2SecretsAccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'kitchen-ec2-secrets-access-${Environment}'
      Description: Allows EC2 instances to read secrets from Secrets Manager
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ReadKitchenSecrets
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource:
              - !Ref DatabaseCredentialsSecret
              - !Ref BackendAPIKeysSecret
              - !Ref EmailConfigSecret
              - !Ref AppConfigSecret
          - Sid: ListSecrets
            Effect: Allow
            Action:
              - secretsmanager:ListSecrets
            Resource: '*'
          - Sid: DecryptSecrets
            Effect: Allow
            Action:
              - kms:Decrypt
            Resource: '*'
            Condition:
              StringEquals:
                'kms:ViaService': !Sub 'secretsmanager.${AWS::Region}.amazonaws.com'

  # IAM Policy for CloudWatch Logs
  EC2CloudWatchLogsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'kitchen-ec2-cloudwatch-logs-${Environment}'
      Description: Allows EC2 to write logs to CloudWatch
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CreateLogGroup
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogStreams
            Resource:
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/kitchen/${Environment}/*'

Outputs:
  DatabaseCredentialsSecretArn:
    Description: ARN of database credentials secret
    Value: !Ref DatabaseCredentialsSecret
    Export:
      Name: !Sub '${AWS::StackName}-DBCredentialsSecretArn'

  DatabaseCredentialsSecretName:
    Description: Name of database credentials secret
    Value: !Sub 'kitchen/${Environment}/database/credentials'
    Export:
      Name: !Sub '${AWS::StackName}-DBCredentialsSecretName'

  BackendAPIKeysSecretArn:
    Description: ARN of backend API keys secret
    Value: !Ref BackendAPIKeysSecret
    Export:
      Name: !Sub '${AWS::StackName}-BackendAPIKeysSecretArn'

  BackendAPIKeysSecretName:
    Description: Name of backend API keys secret
    Value: !Sub 'kitchen/${Environment}/backend/api-keys'
    Export:
      Name: !Sub '${AWS::StackName}-BackendAPIKeysSecretName'

  EmailConfigSecretArn:
    Description: ARN of email configuration secret
    Value: !Ref EmailConfigSecret
    Export:
      Name: !Sub '${AWS::StackName}-EmailConfigSecretArn'

  EC2SecretsAccessPolicyArn:
    Description: ARN of IAM policy for EC2 secrets access
    Value: !Ref EC2SecretsAccessPolicy
    Export:
      Name: !Sub '${AWS::StackName}-EC2SecretsAccessPolicyArn'

  EC2CloudWatchLogsPolicyArn:
    Description: ARN of IAM policy for CloudWatch logs
    Value: !Ref EC2CloudWatchLogsPolicy
    Export:
      Name: !Sub '${AWS::StackName}-EC2CloudWatchLogsPolicyArn'

  SecretUpdateInstructions:
    Description: How to update secrets after deployment
    Value: 'Run: infra/scripts/update-secrets.sh OR use AWS Console/CLI to update placeholder values'
