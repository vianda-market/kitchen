# Pre-commit hooks — run before each commit to catch issues early.
#
# Setup (one-time):
#   pip install pre-commit
#   pre-commit install
#
# Manual run:
#   pre-commit run --all-files
#
# Skip hooks for a single commit (emergency only):
#   git commit --no-verify -m "..."

repos:
  # ── Ruff: lint + format ──────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── Gitleaks: secret scanning ────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  # ── Standard pre-commit hooks ────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict

  # ── Complexity gate (local script) ───────────────────────────
  - repo: local
    hooks:
      - id: check-complexity
        name: Complexity gate (radon)
        entry: bash scripts/check_complexity.sh
        language: system
        pass_filenames: false
        # Only run when Python files change
        types: [python]
